services:
  - type: web
    name: breathe-esg-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py migrate && python backend/manage.py collectstatic --no-input"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: CORS_ALLOWED_ORIGINS
        value: ${FRONTEND_URL}
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}

  - type: static
    name: breathe-esg-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/build
    routes:
      - path: /
        priority: 1
      - path: /*
        priority: 2

databases:
  - name: breathe-esg-db
    engine: postgres
    version: "15"
    databaseName: breatheesg
    region: oregon
    plan: free
